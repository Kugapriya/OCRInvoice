name: iOS Ad Hoc IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: invoice/package-lock.json

      - name: Install dependencies
        working-directory: invoice
        run: npm ci --legacy-peer-deps

      - name: Install Ionic and Capacitor CLI
        run: npm install -g @ionic/cli @capacitor/cli

      - name: Build Ionic app
        working-directory: invoice
        run: npm run build

      # ── KEY FIX: Install @capacitor/ios locally first ──
      - name: Install Capacitor iOS package
        working-directory: invoice
        run: |
          npm install @capacitor/ios --legacy-peer-deps

      # ── KEY FIX: Force add iOS platform ───────────────
      - name: Add iOS platform
        working-directory: invoice
        run: |
          echo "Checking for iOS platform..."
          npx cap add ios
          echo "Checking ios/App was created..."
          ls -la ios/
          ls -la ios/App/
          echo "Checking Podfile exists..."
          ls -la ios/App/Podfile

      - name: Sync Capacitor to iOS
        working-directory: invoice
        run: npx cap sync ios

      # ── KEY FIX: Verify Podfile before pod install ─────
      - name: Verify Podfile exists
        working-directory: invoice
        run: |
          if [ ! -f "ios/App/Podfile" ]; then
            echo "ERROR: Podfile not found!"
            echo "Contents of ios/:"
            ls -la ios/ || echo "ios/ folder missing"
            echo "Contents of ios/App/:"
            ls -la ios/App/ || echo "ios/App/ folder missing"
            exit 1
          else
            echo "Podfile found at ios/App/Podfile"
            cat ios/App/Podfile
          fi

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods || true
          pod --version
          pod repo update --silent || true

      - name: Install iOS Pods
        working-directory: invoice/ios/App
        run: pod install --repo-update

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS archive
        working-directory: invoice
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/app.xcarchive \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER=com.subango.invoice \
            archive

      - name: Export Ad Hoc IPA
        working-directory: invoice
        run: |
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportOptionsPlist ios-config/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

          echo "IPA files:"
          ls -la build/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-adhoc-ipa-${{ github.run_number }}
          path: invoice/build/ipa/*.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
