name: iOS Ad Hoc IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: invoice/package-lock.json

      - name: Install dependencies
        working-directory: invoice
        run: npm ci --legacy-peer-deps

      - name: Install Ionic and Capacitor CLI
        run: npm install -g @ionic/cli @capacitor/cli

      # ── Fix version mismatch first ────────────────────
      - name: Fix Capacitor version mismatch
        working-directory: invoice
        run: |
          npm install @capacitor/core@8.3.4 --legacy-peer-deps

      - name: Build Ionic app
        working-directory: invoice
        run: npm run build

      - name: Install Capacitor iOS
        working-directory: invoice
        run: npm install @capacitor/ios --legacy-peer-deps

      - name: Add iOS platform
        working-directory: invoice
        run: |
          npx cap add ios
          echo "iOS folder contents:"
          ls -la ios/App/

      - name: Sync Capacitor to iOS
        working-directory: invoice
        run: npx cap sync ios

      # ── NO CocoaPods needed — project uses SPM ────────
      - name: Resolve Swift Package dependencies
        working-directory: invoice
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath ios/App/SourcePackages

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "Certificate installed."

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          echo "Provisioning profile installed."

      - name: Build iOS archive
        working-directory: invoice
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/app.xcarchive \
            -clonedSourcePackagesDirPath ios/App/SourcePackages \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER=com.subango.invoice \
            archive

      - name: Export Ad Hoc IPA
        working-directory: invoice
        run: |
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportOptionsPlist ios-config/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

          echo "IPA files:"
          ls -la build/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-adhoc-ipa-${{ github.run_number }}
          path: invoice/build/ipa/*.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
