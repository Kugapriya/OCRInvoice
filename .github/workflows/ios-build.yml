name: iOS Ad Hoc IPA Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      # ─────────────────────────────────────────────────
      # 1. GET THE CODE
      # ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────
      # 2. SETUP NODE
      # ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: invoice/package-lock.json

      # ─────────────────────────────────────────────────
      # 3. INSTALL ALL NPM PACKAGES
      # ─────────────────────────────────────────────────
      - name: Install all dependencies
        working-directory: invoice
        run: |
          npm ci --legacy-peer-deps
          npm install @capacitor/core@8.3.4 --legacy-peer-deps
          npm install @capacitor/ios@8.3.4 --legacy-peer-deps

      # ─────────────────────────────────────────────────
      # 4. INSTALL IONIC + CAPACITOR CLI GLOBALLY
      # ─────────────────────────────────────────────────
      - name: Install Ionic and Capacitor CLI
        run: npm install -g @ionic/cli @capacitor/cli

      # ─────────────────────────────────────────────────
      # 5. BUILD IONIC ANGULAR APP
      # outputs to ../API/wwwroot per angular.json
      # ─────────────────────────────────────────────────
      - name: Build Ionic app
        working-directory: invoice
        run: npm run build

      # ─────────────────────────────────────────────────
      # 6. VERIFY BUILD OUTPUT EXISTS
      # capacitor.config.ts webDir = ../API/wwwroot
      # ─────────────────────────────────────────────────
      - name: Verify build output
        run: |
          echo "=== Checking API/wwwroot ==="
          if [ -d "API/wwwroot" ]; then
            echo "Build output found!"
            ls -la API/wwwroot/
          else
            echo "ERROR: API/wwwroot not found!"
            echo "=== Repo root contents ==="
            ls -la
            exit 1
          fi

      # ─────────────────────────────────────────────────
      # 7. ADD iOS PLATFORM (only if not exists)
      # ─────────────────────────────────────────────────
      - name: Add iOS platform
        working-directory: invoice
        run: |
          if [ ! -d "ios" ]; then
            echo "ios/ not found — running cap add ios..."
            npx cap add ios
          else
            echo "ios/ already exists — skipping"
          fi

      # ─────────────────────────────────────────────────
      # 8. SYNC CAPACITOR
      # reads webDir ../API/wwwroot → copies into ios
      # ─────────────────────────────────────────────────
      - name: Sync Capacitor to iOS
        working-directory: invoice
        run: npx cap sync ios

      # ─────────────────────────────────────────────────
      # 9. FIND EXACT WORKSPACE PATH
      # ─────────────────────────────────────────────────
      - name: Find Xcode workspace
        working-directory: invoice
        run: |
          echo "=== Searching for .xcworkspace ==="
          find ios/ -name "*.xcworkspace" 2>/dev/null
          echo "=== Searching for .xcodeproj ==="
          find ios/ -name "*.xcodeproj" 2>/dev/null
          echo "=== Full ios/ tree ==="
          find ios/ -maxdepth 5 -type d

      # ─────────────────────────────────────────────────
      # 10. RESOLVE SPM PACKAGES
      # ─────────────────────────────────────────────────
      - name: Resolve Swift Package Manager dependencies
        working-directory: invoice
        run: |
          XCWORKSPACE=$(find ios/ -name "*.xcworkspace" | grep -v "\.xcodeproj" | head -1)

          if [ -z "$XCWORKSPACE" ]; then
            echo "No xcworkspace — trying xcodeproj..."
            XCODEPROJ=$(find ios/ -name "*.xcodeproj" | head -1)
            echo "Using xcodeproj: $XCODEPROJ"
            xcodebuild \
              -project "$XCODEPROJ" \
              -scheme App \
              -resolvePackageDependencies \
              -clonedSourcePackagesDirPath ios/App/SourcePackages
          else
            echo "Using xcworkspace: $XCWORKSPACE"
            xcodebuild \
              -workspace "$XCWORKSPACE" \
              -scheme App \
              -resolvePackageDependencies \
              -clonedSourcePackagesDirPath ios/App/SourcePackages
          fi

      # ─────────────────────────────────────────────────
      # 11. INSTALL APPLE CERTIFICATE
      # ─────────────────────────────────────────────────
      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "Certificate installed."

      # ─────────────────────────────────────────────────
      # 12. INSTALL PROVISIONING PROFILE
      # ─────────────────────────────────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          echo "Provisioning profile installed."

      # ─────────────────────────────────────────────────
      # 13. BUILD iOS ARCHIVE
      # ─────────────────────────────────────────────────
      - name: Build iOS archive
        working-directory: invoice
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          XCWORKSPACE=$(find ios/ -name "*.xcworkspace" | grep -v "\.xcodeproj" | head -1)

          if [ -z "$XCWORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found!"
            exit 1
          fi

          echo "Building with workspace: $XCWORKSPACE"

          xcodebuild \
            -workspace "$XCWORKSPACE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/app.xcarchive \
            -clonedSourcePackagesDirPath ios/App/SourcePackages \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER=com.subango.invoice \
            archive

          echo "Archive built successfully."

      # ─────────────────────────────────────────────────
      # 14. EXPORT IPA
      # ─────────────────────────────────────────────────
      - name: Export Ad Hoc IPA
        working-directory: invoice
        run: |
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportOptionsPlist ios-config/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

          echo "=== IPA export complete ==="
          ls -la build/ipa/

      # ─────────────────────────────────────────────────
      # 15. UPLOAD IPA
      # ─────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-adhoc-ipa-${{ github.run_number }}
          path: invoice/build/ipa/*.ipa
          retention-days: 30

      # ─────────────────────────────────────────────────
      # 16. CLEANUP KEYCHAIN
      # ─────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          echo "Keychain cleaned up."
