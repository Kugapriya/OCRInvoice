<ion-content fullscreen scrollEvents="true" class="store-content" keyboardResize="ionic">

  <!-- Sticky Searchbar -->
  <ion-searchbar [(ngModel)]="searchText" (ionInput)="filterStores()" debounce="300"
    placeholder="Search by Store ID or Name" class="sticky-searchbar">
  </ion-searchbar>

  <ion-grid class="store-grid" fixed>
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let store of filteredStores">
        <ion-card class="store-card" (click)="setStore(store)">
          <ion-card-header>
            <ion-card-title class="store-title">
              {{ store.storeName }}
            </ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <p><strong>{{ store.storeId }}</strong></p>
            <p class="address">{{ store.address }}</p>
            <ion-button expand="block" color="success" (click)="setStore(store)">
              Select
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
