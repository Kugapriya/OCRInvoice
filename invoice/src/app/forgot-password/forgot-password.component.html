<ion-content fullscreen class="login-content">
  <div class="login-wrapper">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title class="heading">Forgot Password</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <p class="subtitle">Enter your email to receive a password reset link</p>

        <ion-item lines="none" class="input-item">
          <ion-label position="stacked" class="label-colored">Email</ion-label>
          <ion-input [(ngModel)]="email" name="email" type="email" class="input-colored" placeholder="Enter your email">
          </ion-input>
        </ion-item>

        <ion-button expand="block" class="login-btn" type="button" (click)="forgotPassword()" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Send Reset Email</span>
        </ion-button>

        <ion-button expand="block" class="back-btn" type="button" (click)="goBack()">
          Back to Login
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
