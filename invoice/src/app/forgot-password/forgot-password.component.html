<ion-content fullscreen class="auth-content">
  <div class="auth-wrap">

    <div class="form-panel">

      <!-- Brand inside card -->
      <div class="brand-block">
        <img class="brand-logo" src="assets/logo.png" alt="DocMate logo" />
        <h1 class="brand-name">Forgot Password?</h1>
        <p class="brand-sub">Enter your email to receive a 6-digit OTP</p>
      </div>

      <div class="field-wrap">
        <ion-icon name="mail-outline" class="f-icon"></ion-icon>
        <ion-input #emailInput [(ngModel)]="email" name="email" type="email" placeholder="Email address"
          class="f-input">
        </ion-input>
      </div>

      <ion-button expand="block" class="primary-btn" (click)="sendOtp()" [disabled]="loading || !!fallbackOtp">
        <ion-spinner *ngIf="loading" name="crescent" style="margin-right:8px"></ion-spinner>
        <span *ngIf="!loading">Send OTP</span>
      </ion-button>

      <!-- Fallback OTP (when email not configured) -->
      <div *ngIf="fallbackOtp" class="fallback-box">
        <p class="fallback-note">Email not configured. Your OTP is:</p>
        <div class="fallback-code">{{ fallbackOtp }}</div>
        <p class="fallback-hint">Note this code, then continue.</p>
        <ion-button expand="block" class="primary-btn" (click)="proceedWithOtp()">Continue</ion-button>
      </div>

      <ion-button expand="block" fill="outline" class="outline-btn" (click)="goBack()">
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Back to Login
      </ion-button>

    </div>

  </div>
</ion-content>
