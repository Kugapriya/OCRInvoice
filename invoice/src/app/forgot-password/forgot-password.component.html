<ion-content fullscreen class="fp-content">
  <div class="fp-container">

    <div class="logo-wrapper">
      <div class="logo-circle">
        <ion-icon name="search-outline"></ion-icon>
      </div>
    </div>

    <ion-card class="fp-card">
      <ion-card-header>
        <ion-card-title class="heading">Find Your Account</ion-card-title>
        <ion-card-subtitle class="sub-heading">
          Enter your email to receive a 6-digit OTP
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <div class="input-group">
          <ion-icon name="mail-outline" class="field-icon"></ion-icon>
          <ion-input
            [(ngModel)]="email"
            name="email"
            type="email"
            placeholder="Email address"
            class="custom-input">
          </ion-input>
        </div>

        <ion-button expand="block" class="action-btn" (click)="sendOtp()" [disabled]="loading || !!fallbackOtp">
          <ion-spinner *ngIf="loading" name="crescent" style="margin-right:8px"></ion-spinner>
          <span *ngIf="!loading">Send OTP</span>
        </ion-button>

        <div *ngIf="fallbackOtp" style="margin-top:16px;text-align:center;padding:16px;background:#eef4ff;border-radius:10px;border:1px solid #bfdbfe">
          <p style="margin:0 0 8px;color:#555;font-size:13px">Email not configured. Your OTP is:</p>
          <div style="font-size:34px;font-weight:700;letter-spacing:10px;color:#1d4ed8">{{fallbackOtp}}</div>
          <p style="margin:8px 0 12px;color:#999;font-size:11px">Note this code, then continue.</p>
          <ion-button expand="block" (click)="proceedWithOtp()">Continue</ion-button>
        </div>

        <ion-button expand="block" fill="outline" class="back-btn" (click)="goBack()">
          Back to Login
        </ion-button>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
