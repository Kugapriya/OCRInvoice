<ion-content fullscreen class="auth-content">
  <div class="auth-wrap">

    <div class="form-panel">

      <!-- Brand inside card -->
      <div class="brand-block">
        <h1 class="brand-name">DocMate<span class="accent">Capture</span></h1>
        <p class="brand-sub">Sign in to your account</p>
      </div>

      <!-- Fields -->
      <div class="field-wrap">
        <ion-icon name="mail-outline" class="f-icon"></ion-icon>
        <ion-input
          #emailInput
          [(ngModel)]="model.username"
          name="username"
          type="email"
          placeholder="Email address"
          class="f-input">
        </ion-input>
      </div>

      <div class="field-wrap">
        <ion-icon name="lock-closed-outline" class="f-icon"></ion-icon>
        <ion-input
          [(ngModel)]="model.password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          class="f-input">
        </ion-input>
        <button class="eye-btn" type="button" (click)="togglePassword()">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </button>
      </div>

      <ion-button expand="block" class="primary-btn" type="button" (click)="login()">
        Log In
      </ion-button>

      <div class="divider">
        <span></span><small>or</small><span></span>
      </div>

      <ion-button expand="block" fill="clear" routerLink="/forgot-password" class="link-btn">
        Forgot password?
      </ion-button>

    </div>

  </div>
</ion-content>
