<ion-content class="ion-padding">
  <ion-grid *ngIf="uploadedFiles.length > 0">
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let file of uploadedFiles">
        <ion-card class="file-card">
          <ion-card-content class="file-card-content"
            style="display: flex; justify-content: space-between; align-items: center;">
            <div class="file-details" style="flex: 1;">
              <p class="file-name">{{ file.fileName }}</p>
              <p><strong>Supplier:</strong> {{ file.supplierName || 'N/A' }}</p>
              <p><strong>Process:</strong> {{ file.isProcess }}</p>
              <!-- <p><strong>Uploaded:</strong> {{ file.uploadedTime | date:'short' }}</p> -->
              <p><strong>Uploaded:</strong> {{ getFormattedDateWithMs(file.uploadedTime) }}</p>
            </div>

            <div style="display: flex; gap: 8px;">
              <ion-button (click)="previewFile(file)" fill="clear" color="primary"
                style="min-width: auto;" title="Preview file">
                <ion-icon name="eye-outline" slot="icon-only"></ion-icon>
              </ion-button>
              <ion-button (click)="downloadFile(file)" fill="clear" color="primary"
                style="min-width: auto;" title="Download file">
                <ion-icon name="download-outline" slot="icon-only"></ion-icon>
              </ion-button>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
