<ion-content class="files-content">

  <!-- Date Filter -->
  <div class="filter-bar">
    <div class="filter-field">
      <label>From</label>
      <input type="date" [(ngModel)]="filterFrom" (change)="applyFilter()" class="date-input">
    </div>
    <div class="filter-divider">
      <ion-icon name="arrow-forward-outline"></ion-icon>
    </div>
    <div class="filter-field">
      <label>To</label>
      <input type="date" [(ngModel)]="filterTo" (change)="applyFilter()" class="date-input">
    </div>
    <button class="clear-btn" (click)="clearFilter()" *ngIf="filterFrom || filterTo" title="Clear filter">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <!-- File List -->
  <div class="file-list">
    <div class="file-card" *ngFor="let file of pagedFiles">

      <div class="file-avatar" [class]="getFileClass(file.fileName)">
        <ion-icon [name]="getFileIcon(file.fileName)"></ion-icon>
      </div>

      <div class="file-body">
        <div class="file-name" [title]="file.fileName">{{ file.fileName }}</div>
        <div class="file-meta">
          <span class="meta-chip" *ngIf="file.supplierName">
            <ion-icon name="business-outline"></ion-icon>
            {{ file.supplierName }}
          </span>
          <span class="meta-chip">
            <ion-icon name="settings-outline"></ion-icon>
            {{ file.processType }}
          </span>
        </div>
        <div class="file-date">
          <ion-icon name="time-outline"></ion-icon>
          {{ file.uploadedTime | date:'dd MMM yyyy, HH:mm' }}
        </div>
      </div>

      <div class="file-actions">
        <button class="action-btn preview-btn" (click)="previewFile(file)" title="Preview">
          <ion-icon name="eye-outline"></ion-icon>
        </button>
        <button class="action-btn download-btn" (click)="downloadFile(file)" title="Download">
          <ion-icon name="download-outline"></ion-icon>
        </button>
      </div>

    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>
    <span class="page-info">{{ currentPage }} / {{ totalPages }}</span>
    <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </button>
  </div>

</ion-content>

<!-- Preview Overlay -->
<div class="preview-overlay" *ngIf="previewVisible" (click)="closePreview()">
  <div class="preview-panel" (click)="$event.stopPropagation()">

    <div class="preview-header">
      <ion-icon [name]="getFileIcon(previewFileName)" class="preview-type-icon"></ion-icon>
      <span class="preview-title">{{ previewFileName }}</span>
      <button class="close-btn" (click)="closePreview()">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <div class="preview-body">
      <iframe *ngIf="previewIsPdf" [src]="safePreviewUrl" class="preview-frame" frameborder="0">
      </iframe>
      <img *ngIf="previewIsImage" [src]="safePreviewUrl" class="preview-img" alt="preview">
      <div class="preview-unsupported" *ngIf="!previewIsPdf && !previewIsImage">
        <ion-icon name="document-outline"></ion-icon>
        <p>Preview not available for this file type</p>
        <button class="dl-btn" (click)="downloadFile(previewFileRef!)">
          <ion-icon name="download-outline"></ion-icon> Download instead
        </button>
      </div>
    </div>

  </div>
</div>
