<div class="vendor-edit-container">

  <form *ngIf="service.selectedVendor" class="edit-form">
    <div class="form-body">
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <label>Supplier</label>
          <input class="form-control"
            name="supplierName"
            [(ngModel)]="service.selectedVendor.supplierName">
        </div>

        <div class="col-12 col-md-4">
          <label>Contact Name</label>
          <input class="form-control"
            name="contactName"
            [(ngModel)]="service.selectedVendor.contactName">
        </div>

        <div class="col-12 col-md-4">
          <label>Email</label>
          <input class="form-control"
            name="email"
            [(ngModel)]="service.selectedVendor.email">
        </div>
      </div>

      <div class="row g-3 mt-1">

        <div class="col-12 col-md-4">
          <label>Mobile</label>
          <input class="form-control"
            name="mobileNumber"
            [(ngModel)]="service.selectedVendor.mobileNumber">
        </div>

        <div class="col-12 col-md-4">
          <label>City</label>
          <input class="form-control"
            name="city"
            [(ngModel)]="service.selectedVendor.city">
        </div>

        <div class="col-12 col-md-4">
          <label>Address</label>
          <input class="form-control"
            name="address1"
            [(ngModel)]="service.selectedVendor.address1">
        </div>

      </div>

    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-warning" (click)="clear()">
        Cancel
      </button>
      <button type="button" class="btn btn-success" (click)="save()">
        Save
      </button>
    </div>
  </form>
</div>
