<div class="edit-page" *ngIf="service.selectedVendor">

  <div class="edit-header">
    <button class="back-btn" type="button" (click)="clear()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <span class="edit-title">{{ service.isCreatingNew ? 'New Vendor' : 'Edit Vendor' }}</span>
  </div>

  <form class="edit-form" autocomplete="off">

    <div class="form-group">
      <label>Supplier <span class="req">*</span></label>
      <input class="form-control" [class.input-error]="supplierNameExists"
        name="supplierName" [(ngModel)]="service.selectedVendor.supplierName"
        (input)="onSupplierNameInput()" placeholder="Supplier name" autocomplete="off">
      <span class="field-error" *ngIf="supplierNameExists">Supplier already exists</span>
    </div>

    <div class="form-group">
      <label>Contact Name</label>
      <input class="form-control" name="contactName"
        [(ngModel)]="service.selectedVendor.contactName"
        placeholder="Contact person" autocomplete="off">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input class="form-control" name="email" type="email"
        [(ngModel)]="service.selectedVendor.email"
        placeholder="Email address" autocomplete="off">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mobile</label>
        <input class="form-control" name="mobileNumber" type="tel" inputmode="numeric"
          [(ngModel)]="service.selectedVendor.mobileNumber"
          placeholder="Mobile" (keypress)="onlyNumbers($event)" autocomplete="off">
      </div>
      <div class="form-group">
        <label>City</label>
        <input class="form-control" name="city"
          [(ngModel)]="service.selectedVendor.city"
          placeholder="City" autocomplete="off">
      </div>
    </div>

    <div class="form-group">
      <label>Address</label>
      <input class="form-control" name="address1"
        [(ngModel)]="service.selectedVendor.address1"
        placeholder="Address" autocomplete="off">
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="clear()">Cancel</button>
      <button type="button" class="btn-save" [disabled]="isSaveDisabled()" (click)="save()">
        Save
      </button>
    </div>

  </form>

</div>
