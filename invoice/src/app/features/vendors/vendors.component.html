<ion-content class="vendors-content" *ngIf="service.vendor_tableMode">

  <div class="page-wrap">

    <div class="toolbar">
      <button class="btn-create" (click)="createNewVendor()">
        <ion-icon name="add-outline"></ion-icon> New
      </button>
      <div class="search-wrap">
        <ion-icon name="search-outline"></ion-icon>
        <input type="search" placeholder="Search..." [(ngModel)]="searchQuery" (ngModelChange)="onSearch()">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Supplier</th>
            <th>Contact</th>
            <th>Email</th>
            <th>City</th>
            <th class="col-act"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of filteredVendors" (click)="editVendor(v)">
            <td class="cell-name">{{ v.supplierName }}</td>
            <td>{{ v.contactName }}</td>
            <td>{{ v.email }}</td>
            <td>{{ v.city }}</td>
            <td class="col-act" (click)="$event.stopPropagation()">
              <button class="btn-edit" (click)="editVendor(v)">
                <ion-icon name="pencil-outline"></ion-icon>
              </button>
              <button class="btn-delete" (click)="deleteVendor(v.id)">
                <ion-icon name="trash-outline"></ion-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</ion-content>

<app-vendor-edit *ngIf="!service.vendor_tableMode"></app-vendor-edit>
