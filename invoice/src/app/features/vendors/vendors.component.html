<div class="container-fluid users-container">

  <div *ngIf="service.vendor_tableMode" class="users-table-view">

    <div class="table-toolbar">

      <button class="btn-create" (click)="createNewVendor()">
        <i class="fa fa-plus"></i>
        <span class="btn-create__label">Create</span>
      </button>
    </div>

    <div class="table-responsive">
      <table class="vendors-table">
        <thead>
          <tr>
            <th>Supplier</th>
            <th>Contact</th>
            <th>Email</th>
            <th>City</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of service.vendors" class="vendor-row" (click)="editVendor(v)">
            <td class="cell-primary">{{ v?.supplierName }}</td>
            <td class="cell-secondary">{{ v?.contactName }}</td>
            <td class="cell-secondary">{{ v?.email }}</td>
            <td class="cell-secondary">{{ v?.city }}</td>
            <td class="col-actions" (click)="$event.stopPropagation()">
              <button class="action-btn action-btn--edit" type="button" (click)="editVendor(v)" title="Edit">
                <i class="fa fa-pencil"></i>
              </button>
              <button class="action-btn action-btn--delete" type="button" (click)="deleteVendor(v.id)" title="Delete">
                <i class="fa fa-trash"></i>
              </button>
            </td>
          </tr>

          <tr *ngIf="service.vendors?.length === 0">
            <td colspan="5" class="empty-row">No vendors found</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <div *ngIf="!service.vendor_tableMode">
    <app-vendor-edit></app-vendor-edit>
  </div>

</div>
