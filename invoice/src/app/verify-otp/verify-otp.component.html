<ion-content fullscreen class="auth-content">
  <div class="auth-wrap">

    <div class="form-panel">

      <!-- Brand inside card -->
      <div class="brand-block">
        <img class="brand-logo" src="assets/logo.png" alt="DocMate logo" />
        <h1 class="brand-name">Verify OTP</h1>
        <p class="brand-sub">
          Enter the 6-digit code sent to<br>
          <strong class="email-highlight">{{ email }}</strong>
        </p>
      </div>

      <!-- OTP boxes -->
      <div class="otp-boxes">
        <input *ngFor="let box of otpBoxes; let i = index" #otpInput type="tel" inputmode="numeric" maxlength="1"
          class="otp-box" [(ngModel)]="otpDigits[i]" (input)="onDigitInput($event, i)" (keydown)="onKeyDown($event, i)"
          (paste)="onPaste($event)">
      </div>

      <!-- Resend row -->
      <div class="resend-row">
        <span class="resend-label">Didn't receive it?</span>
        <ion-button fill="clear" class="resend-btn" (click)="resendOtp()" [disabled]="resendCooldown > 0">
          {{ resendCooldown > 0 ? 'Resend in ' + resendCooldown + 's' : 'Resend OTP' }}
        </ion-button>
      </div>

      <!-- Auto-verifies when 6th digit is entered — spinner shown while checking -->
      <div class="auto-verify-row" *ngIf="loading">
        <ion-spinner name="crescent" class="verify-spinner"></ion-spinner>
        <span class="verify-label">Verifying...</span>
      </div>

      <ion-button expand="block" fill="clear" class="back-btn" (click)="goBack()">
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Back to Email
      </ion-button>

    </div>

  </div>
</ion-content>
