<ion-content fullscreen class="login-content">
  <div class="login-wrapper">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title class="heading">Reset Password</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <div *ngIf="!passwordReset">
          <ion-item lines="none" class="input-item">
            <ion-label position="stacked" class="label-colored">New Password</ion-label>
            <ion-input 
              [(ngModel)]="newPassword" 
              name="newPassword" 
              [type]="showPassword ? 'text' : 'password'" 
              class="input-colored"
              placeholder="Enter new password">
            </ion-input>
            <ion-icon 
              [name]="showPassword ? 'eye' : 'eye-off'" 
              (click)="togglePasswordVisibility()"
              class="password-toggle">
            </ion-icon>
          </ion-item>

          <ion-item lines="none" class="input-item">
            <ion-label position="stacked" class="label-colored">Confirm Password</ion-label>
            <ion-input 
              [(ngModel)]="confirmPassword" 
              name="confirmPassword" 
              [type]="showConfirmPassword ? 'text' : 'password'" 
              class="input-colored"
              placeholder="Confirm password">
            </ion-input>
            <ion-icon 
              [name]="showConfirmPassword ? 'eye' : 'eye-off'" 
              (click)="toggleConfirmPasswordVisibility()"
              class="password-toggle">
            </ion-icon>
          </ion-item>

          <ion-button 
            expand="block" 
            class="login-btn" 
            type="button" 
            (click)="resetPassword()"
            [disabled]="loading">
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Reset Password</span>
          </ion-button>
        </div>

        <div *ngIf="passwordReset" class="success-message">
          <ion-icon name="checkmark-circle" color="success"></ion-icon>
          <h2>Password Reset!</h2>
          <p>Your password has been reset successfully.</p>
          <p>Redirecting to login...</p>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
