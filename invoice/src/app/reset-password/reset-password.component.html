<ion-content fullscreen class="rp-content">
  <div class="rp-container">

    <div class="logo-wrapper">
      <div class="logo-circle">
        <ion-icon name="lock-open-outline"></ion-icon>
      </div>
    </div>

    <ion-card class="rp-card">
      <ion-card-header>
        <ion-card-title class="heading">New Password</ion-card-title>
        <ion-card-subtitle class="sub-heading">Choose a strong password</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <div *ngIf="!passwordReset">

          <!-- New Password -->
          <div class="input-group" [class.has-error]="errors.newPassword">
            <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
            <ion-input
              [(ngModel)]="newPassword"
              name="newPassword"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="New password (min 6 characters)"
              class="custom-input"
              (ngModelChange)="validatePasswords()">
            </ion-input>
            <ion-button fill="clear" class="eye-btn" (click)="togglePasswordVisibility()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </div>
          <div class="error-msg" *ngIf="errors.newPassword">
            <ion-icon name="alert-circle-outline"></ion-icon>
            {{ errors.newPassword }}
          </div>

          <!-- Confirm Password -->
          <div class="input-group" [class.has-error]="errors.confirmPassword">
            <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
            <ion-input
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              placeholder="Confirm password"
              class="custom-input"
              (ngModelChange)="validatePasswords()">
            </ion-input>
            <ion-button fill="clear" class="eye-btn" (click)="toggleConfirmPasswordVisibility()">
              <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </div>
          <div class="error-msg" *ngIf="errors.confirmPassword">
            <ion-icon name="alert-circle-outline"></ion-icon>
            {{ errors.confirmPassword }}
          </div>

          <!-- Password strength bar -->
          <div class="strength-bar" *ngIf="newPassword">
            <div class="strength-track">
              <div class="strength-fill" [style.width]="strengthPercent + '%'" [class]="strengthClass"></div>
            </div>
            <span class="strength-label" [class]="strengthClass">{{ strengthLabel }}</span>
          </div>

          <ion-button expand="block" class="action-btn" (click)="resetPassword()" [disabled]="loading">
            <ion-spinner *ngIf="loading" name="crescent" style="margin-right:8px"></ion-spinner>
            <span *ngIf="!loading">Reset Password</span>
          </ion-button>

        </div>

        <div *ngIf="passwordReset" class="success-block">
          <div class="success-icon-wrap">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
          </div>
          <h2>Password Updated!</h2>
          <p>Redirecting to login...</p>
        </div>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
