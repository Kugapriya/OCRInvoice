<ion-content fullscreen class="auth-content">
  <div class="auth-wrap">

    <div class="form-panel">

      <!-- Brand inside card -->
      <div class="brand-block">
        <div class="brand-icon">
          <ion-icon name="lock-open-outline"></ion-icon>
        </div>
        <h1 class="brand-name">New Password</h1>
        <p class="brand-sub">Choose a strong password</p>
      </div>

      <div *ngIf="!passwordReset">

        <!-- New password -->
        <div class="field-wrap" [class.has-error]="errors.newPassword">
          <ion-icon name="lock-closed-outline" class="f-icon"></ion-icon>
          <ion-input
            #newPasswordInput
            [(ngModel)]="newPassword"
            name="newPassword"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="New password (min 6 characters)"
            class="f-input"
            (ngModelChange)="validatePasswords()">
          </ion-input>
          <button class="eye-btn" type="button" (click)="togglePasswordVisibility()">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
        <div class="error-msg" *ngIf="errors.newPassword">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errors.newPassword }}
        </div>

        <!-- Confirm password -->
        <div class="field-wrap mt-12" [class.has-error]="errors.confirmPassword">
          <ion-icon name="lock-closed-outline" class="f-icon"></ion-icon>
          <ion-input
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Confirm password"
            class="f-input"
            (ngModelChange)="validatePasswords()">
          </ion-input>
          <button class="eye-btn" type="button" (click)="toggleConfirmPasswordVisibility()">
            <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
        <div class="error-msg" *ngIf="errors.confirmPassword">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errors.confirmPassword }}
        </div>

        <!-- Strength bar -->
        <div class="strength-bar mt-12" *ngIf="newPassword">
          <div class="strength-track">
            <div class="strength-fill" [style.width]="strengthPercent + '%'" [class]="strengthClass"></div>
          </div>
          <span class="strength-label" [class]="strengthClass">{{ strengthLabel }}</span>
        </div>

        <ion-button expand="block" class="primary-btn mt-16" (click)="resetPassword()" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent" style="margin-right:8px"></ion-spinner>
          <span *ngIf="!loading">Reset Password</span>
        </ion-button>

      </div>

      <!-- Success state -->
      <div *ngIf="passwordReset" class="success-block">
        <div class="success-icon">
          <ion-icon name="checkmark-circle-outline"></ion-icon>
        </div>
        <h2>Password Updated!</h2>
        <p>Redirecting to login...</p>
      </div>

    </div>

  </div>
</ion-content>
